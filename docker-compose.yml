version: '3.9'

services:

  air-quality-dashboard:

    build: .

    container_name: industrial_dashboard

    ports:
      - "5000:5000"

    restart: always

    volumes:
      - .:/app

  prometheus:

    image: prom/prometheus

    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

    depends_on:
      - air-quality-dashboard

  grafana:

    image: grafana/grafana

    container_name: grafana

    ports:
      - "3000:3000"

    depends_on:
      - prometheus
